# Expectations for the CLEAN demo table. Every check here is expected to PASS.
# The runner loads one expectation file per table (keyed by the `table:` field
# below); users.yml carries the same battery of checks against the DRIFTED table
# so the dashboard shows passing AND failing checks side by side.
table: orders_clean
timestamp_column: created_at

schema:
  id: int
  amount: float
  quantity: int
  status: string
  created_at: datetime

checks:
  - type: schema_check
    severity: critical

  - type: null_check
    column: amount
    threshold: 0.0
    severity: warning

  - type: range_check
    column: amount
    min: 0
    max: 10000
    threshold: 1.0
    severity: warning

  - type: range_check
    column: quantity
    min: 1
    max: 10
    threshold: 1.0
    severity: info

  - type: freshness_check
    column: created_at
    max_age_hours: 48
    severity: warning

  - type: drift_check
    column: amount
    baseline_table: orders_clean
    baseline_column: amount
    bins: 10
    threshold: 0.2
    severity: warning
