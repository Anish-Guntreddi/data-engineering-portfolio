name: streampulse

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: streampulse-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      # 'redpanda' is the docker-network hostname; 'localhost' for host clients.
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:${REDPANDA_PORT:-19092}
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "${REDPANDA_PORT:-19092}:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [streampulse]

  console:
    image: redpandadata/console:v2.7.2
    container_name: streampulse-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8090}:8080"
    networks: [streampulse]

  postgres:
    image: postgres:16
    container_name: streampulse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-streampulse}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-streampulse}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [streampulse]

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    image: streampulse-app:latest
    container_name: streampulse-producer
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-redpanda:9092}
      EVENTS_TOPIC: ${EVENTS_TOPIC:-events}
      PRODUCE_RATE: ${PRODUCE_RATE:-8}
      PRODUCER_SEED: ${PRODUCER_SEED:-7}
      BURST_EVERY: ${BURST_EVERY:-50}
      BURST_MULTIPLIER: ${BURST_MULTIPLIER:-12}
    command: ["python", "-m", "streampulse.producer.main"]
    restart: unless-stopped
    networks: [streampulse]

  processor:
    image: streampulse-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streampulse-processor
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-redpanda:9092}
      EVENTS_TOPIC: ${EVENTS_TOPIC:-events}
      WINDOW_SECONDS: ${WINDOW_SECONDS:-60}
      FLUSH_SECONDS: ${FLUSH_SECONDS:-5}
      PGHOST: ${PGHOST:-postgres}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-streampulse}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
    command: ["python", "-m", "streampulse.processor.main"]
    restart: unless-stopped
    networks: [streampulse]

  alerter:
    image: streampulse-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streampulse-alerter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WINDOW_SECONDS: ${WINDOW_SECONDS:-60}
      LOOKBACK_WINDOWS: ${LOOKBACK_WINDOWS:-20}
      POLL_SECONDS: ${POLL_SECONDS:-5}
      EPM_MAX: ${EPM_MAX:-300}
      CONV_MIN: ${CONV_MIN:-0.02}
      PGHOST: ${PGHOST:-postgres}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-streampulse}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
    command: ["python", "-m", "streampulse.alerter.main"]
    restart: unless-stopped
    networks: [streampulse]

  dashboard:
    image: streampulse-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streampulse-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REFRESH_SECONDS: ${REFRESH_SECONDS:-5}
      PGHOST: ${PGHOST:-postgres}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-streampulse}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
    command:
      - streamlit
      - run
      - streampulse/dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    ports:
      - "${DASHBOARD_PORT:-8502}:8501"
    restart: unless-stopped
    networks: [streampulse]

volumes:
  pgdata:

networks:
  streampulse:
    driver: bridge
