version: 2

sources:
  - name: raw
    description: "Raw landing tables populated by the deterministic generator."
    schema: raw
    tables:
      - name: users
        description: "One row per user."
        columns:
          - name: user_id
            description: "Primary key."
            tests:
              - not_null
              - unique
          - name: signup_date
            tests:
              - not_null
          - name: country
            tests:
              - not_null
          - name: plan
            tests:
              - not_null
              - accepted_values:
                  values: ["free", "pro", "enterprise"]
      - name: events
        description: "Behavioural event stream."
        columns:
          - name: event_id
            tests:
              - not_null
              - unique
          - name: user_id
            tests:
              - not_null
          - name: event_type
            tests:
              - not_null
              - accepted_values:
                  values: ["page_view", "click", "signup", "purchase"]
          - name: event_ts
            tests:
              - not_null
          - name: session_id
            tests:
              - not_null
      - name: orders
        description: "Commerce transactions."
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: user_id
            tests:
              - not_null
          - name: amount
            tests:
              - not_null
          - name: order_ts
            tests:
              - not_null
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: ["placed", "completed", "refunded"]
